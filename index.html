<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>The Macro Edit - Daily Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f3e2d2;color:#1c1c1c;min-height:100vh;padding:28px 16px;}
.wrap{max-width:640px;margin:0 auto;}
.hdr{background:#5c2a57;border-radius:16px;padding:30px 32px 26px;margin-bottom:20px;}
.hdr-tag{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#d8a7b1;margin-bottom:6px;}
.hdr h1{font-size:26px;font-weight:700;color:#fff;text-transform:uppercase;line-height:1.2;}
.hdr h1 span{color:#a895bf;}
.hdr-line{width:36px;height:2px;background:#d8a7b1;margin:14px 0 10px;}
.hdr p{font-size:12px;color:#f3e2d2;opacity:.85;font-weight:300;line-height:1.7;}
.card{background:#fff;border-radius:14px;padding:26px 28px;box-shadow:0 4px 24px rgba(92,42,87,.08);margin-bottom:16px;}
.ctitle{font-size:10px;font-weight:700;color:#5c2a57;text-transform:uppercase;letter-spacing:.1em;margin-bottom:18px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.lbl{font-size:10px;font-weight:700;color:#3a3a3a;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:block;}
input[type=number]{width:100%;padding:10px 14px;border-radius:8px;border:1.5px solid #e0d0ea;font-family:'Poppins',sans-serif;font-size:16px;font-weight:700;color:#5c2a57;background:#fffaf6;outline:none;text-align:center;}
input[type=number]:focus{border-color:#a895bf;}
.btn{width:100%;padding:14px;border-radius:30px;background:#5c2a57;color:#fff;border:none;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;font-family:'Poppins',sans-serif;}
.btn:hover{background:#4a2145;}
.btn-outline{width:100%;padding:12px;border-radius:30px;background:transparent;color:#5c2a57;border:2px solid #5c2a57;font-size:12px;font-weight:700;cursor:pointer;font-family:'Poppins',sans-serif;margin-top:10px;}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.macro-box{background:#f3e2d2;border-radius:10px;padding:12px 6px;text-align:center;}
.macro-val{font-size:22px;font-weight:700;}
.macro-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#3a3a3a;}
.macro-unit{font-size:10px;color:#8fa4b6;}
.water{text-align:center;font-size:11px;color:#8fa4b6;margin-top:8px;}
.water strong{color:#5c2a57;}
.day-tabs{display:flex;gap:8px;margin-bottom:16px;}
.day-tab{flex:1;padding:10px;border-radius:10px;background:#fff;border:2px solid #e0d0ea;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;color:#3a3a3a;cursor:pointer;text-align:center;text-transform:uppercase;letter-spacing:.06em;}
.day-tab.active{background:#5c2a57;border-color:#5c2a57;color:#fff;}
.day-panel{display:none;}
.day-panel.active{display:block;}
.meal{background:#fff;border-radius:14px;padding:20px 24px;margin-bottom:12px;box-shadow:0 2px 12px rgba(92,42,87,.05);}
.meal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.meal-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#1c1c1c;}
.meal-recipe{font-size:11px;color:#a895bf;font-style:italic;margin-top:3px;}
.meal-macros{font-size:10px;color:#3a3a3a;text-align:right;line-height:1.8;}
.meal-macros strong{color:#5c2a57;font-weight:700;display:block;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead th{text-align:left;font-size:9px;font-weight:700;color:#8fa4b6;text-transform:uppercase;letter-spacing:.08em;padding:5px 8px;border-bottom:1px solid #f3e2d2;}
tbody td{padding:8px;border-bottom:1px solid #f3e2d2;vertical-align:middle;}
.td-food{color:#1c1c1c;font-weight:500;}
.td-amt{color:#5c2a57;font-weight:700;white-space:nowrap;}
.td-unit{color:#8fa4b6;font-size:10px;}
.td-note{color:#bbb;font-size:10px;font-style:italic;}
.callout{background:#5c2a57;border-radius:12px;padding:18px 22px;margin-bottom:16px;}
.callout p{font-size:11px;color:#f3e2d2;line-height:1.7;}
.callout strong{color:#d8a7b1;font-weight:700;display:block;margin-bottom:4px;}
.hidden{display:none;}
.footer{text-align:center;margin-top:20px;font-size:10px;color:#3a3a3a;letter-spacing:.06em;padding-bottom:20px;}
@media print{
  .input-section,.btn,.btn-outline,.day-tabs,.footer{display:none !important;}
  body{background:#fff;padding:0;}
  .meal,.card{box-shadow:none;border:1px solid #eee;}
  .day-panel{display:block !important;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-tag">THE | MACRO | EDIT</div>
    <h1>Your <span>Personalized</span><br>Daily Menu</h1>
    <div class="hdr-line"></div>
    <p>Enter your 4 macro numbers from your calculator plus your body weight. Your 3-day menu with exact portions will appear below.</p>
  </div>

  <div class="card input-section">
    <div class="ctitle">Enter Your Daily Macros</div>
    <div class="grid2">
      <div><label class="lbl">Calories (kcal)</label><input type="number" id="cal" value="1769" oninput="build()"/></div>
      <div><label class="lbl">Protein (g)</label><input type="number" id="pro" value="150" oninput="build()"/></div>
      <div><label class="lbl">Carbs (g)</label><input type="number" id="carb" value="173" oninput="build()"/></div>
      <div><label class="lbl">Fat (g)</label><input type="number" id="fat" value="53" oninput="build()"/></div>
      <div style="grid-column:1/-1"><label class="lbl">Body Weight (lbs)</label><input type="number" id="wlbs" value="150" oninput="build()"/></div>
    </div>
    <button class="btn" onclick="build()">Build My Menu</button>
  </div>

  <div id="menu-out" class="hidden"></div>
  <div class="footer">THE | MACRO | EDIT &nbsp; allfitnessbylexi@gmail.com &nbsp; @the_macro_edit</div>
</div>

<script>
// Round to nearest 5, minimum 0
function r5(n) { return Math.max(0, Math.round(n / 5) * 5); }

// How many grams of food X needed to hit targetP grams of protein
// given food has protPer100g protein per 100g, capped at maxG
function proG(targetP, protPer100g, maxG) {
  return Math.min(r5(Math.max(0, targetP) / protPer100g * 100), maxG);
}

// How many grams of food X needed to hit targetC grams of carbs
// given food has carbPer100g carbs per 100g, capped at maxG
function carbG(targetC, carbPer100g, maxG) {
  return Math.min(r5(Math.max(0, targetC) / carbPer100g * 100), maxG);
}

// How many grams of food X needed to hit targetF grams of fat
function fatG(targetF, fatPer100g, maxG) {
  return Math.min(r5(Math.max(0, targetF) / fatPer100g * 100), maxG);
}

function build() {
  var cal  = parseFloat(document.getElementById('cal').value)  || 0;
  var pro  = parseFloat(document.getElementById('pro').value)  || 0;
  var carb = parseFloat(document.getElementById('carb').value) || 0;
  var fat  = parseFloat(document.getElementById('fat').value)  || 0;
  var wlbs = parseFloat(document.getElementById('wlbs').value) || 150;
  if (!cal || !pro || !carb || !fat) return;

  var water = Math.round(wlbs / 2);

  // Meal targets as % of daily totals
  var bP  = Math.round(pro  * 0.25); var bC  = Math.round(carb * 0.25); var bF  = Math.round(fat * 0.20);
  var s1P = Math.round(pro  * 0.10); var s1C = Math.round(carb * 0.10); var s1F = Math.round(fat * 0.10);
  var lP  = Math.round(pro  * 0.30); var lC  = Math.round(carb * 0.30); var lF  = Math.round(fat * 0.25);
  var s2P = Math.round(pro  * 0.10); var s2C = Math.round(carb * 0.10); var s2F = Math.round(fat * 0.10);
  var dP  = Math.round(pro  * 0.25); var dC  = Math.round(carb * 0.25); var dF  = Math.round(fat * 0.25);

  // ── BREAKFAST shared calculations ──────────────────────
  // 2 whole eggs = fixed: 12g protein, 0g carbs, 10g fat
  // Egg whites fill remaining breakfast protein (max 180g = ~6 whites)
  var ewG  = proG(bP - 12, 0.12, 180);
  // Oats fill 70% of breakfast carbs (max 80g dry)
  var oatsG = carbG(bC * 0.7, 0.65, 80);

  // ── DAY 1 ──────────────────────────────────────────────
  // LUNCH D1: chicken fills protein minus ~3g from veggies. Rice fills carbs. Avocado fills fat.
  var d1lCkG  = proG(lP - 3, 0.31, 200);
  var d1lRiG  = carbG(lC, 0.28, 200);
  var d1lAvG  = fatG(lF * 0.6, 0.15, 80);
  var d1lOiG  = fatG(lF * 0.3, 0.45, 15);
  // DINNER D1: salmon fills protein minus ~2g. Sweet potato fills carbs. Olive oil fills fat.
  var d1dSaG  = proG(dP - 2, 0.20, 180);
  var d1dSpG  = carbG(dC, 0.20, 200);
  var d1dOiG  = fatG(dF * 0.5, 0.45, 15);

  // ── DAY 2 ──────────────────────────────────────────────
  // BREAKFAST D2: Kodiak fills carbs. Egg whites fill protein (minus 2 eggs=12g, Kodiak~12g).
  var d2bKoG  = carbG(bC * 0.7, 0.62, 80);
  var d2bEwG  = proG(bP - 12 - Math.round(d2bKoG * 0.12), 0.12, 180);
  // SNACK1 D2: cottage cheese fills protein
  var d2s1CoG = proG(s1P, 0.11, 200);
  // LUNCH D2: turkey fills protein minus ~5g beans. Rice fills 60% carbs. Beans fill 30%.
  var d2lTkG  = proG(lP - 5, 0.27, 200);
  var d2lRiG  = carbG(lC * 0.6, 0.28, 180);
  var d2lBeG  = carbG(lC * 0.3, 0.21, 100);
  var d2lAvG  = fatG(lF * 0.6, 0.15, 80);
  // DINNER D2: turkey fills protein. Potatoes fill carbs.
  var d2dTkG  = proG(dP - 2, 0.27, 200);
  var d2dPoG  = carbG(dC, 0.17, 200);
  var d2dOiG  = fatG(dF * 0.5, 0.45, 15);

  // ── DAY 3 ──────────────────────────────────────────────
  // BREAKFAST D3: oats + protein powder (25g) + Fairlife (13g) + 2 eggs (12g) = 50g fixed protein
  // If bP > 50, note it. Oats fill carbs.
  var d3bOaG  = carbG(bC * 0.6, 0.65, 80);
  // SNACK1 D3: tuna fills protein
  var d3s1TuG = proG(s1P, 0.25, 140);
  var d3s1RcN = Math.max(1, Math.min(4, Math.round(s1C / 7)));
  // LUNCH D3: shrimp fills protein. Quinoa fills carbs.
  var d3lShG  = proG(lP - 5, 0.24, 200);
  var d3lQuG  = carbG(lC, 0.21, 200);
  var d3lOiG  = fatG(lF * 0.5, 0.45, 15);
  // SNACK2 D3: fixed (yogurt 120g = 12g + bar = 21g)
  // DINNER D3: chicken thighs fill protein. Brown rice fills carbs.
  var d3dThG  = proG(dP - 2, 0.19, 200);
  var d3dBrG  = carbG(dC, 0.23, 200);
  var d3dOiG  = fatG(dF * 0.5, 0.45, 15);

  // ── SNACK 2 shared ──────────────────────────────────────
  // Protein shake: 1 scoop (25g P) + Fairlife 240ml (13g P) = 38g fixed
  // Rice cakes for Day 2 snack
  var s2RcN = Math.max(1, Math.min(4, Math.round(s2C / 7)));

  var day1 = [
    { title:"BREAKFAST", recipe:"Protein Omelet + Oatmeal with Berries",
      cal:Math.round(cal*0.25), p:bP, c:bC, f:bF,
      rows:[
        ["Whole eggs",             "2",               "eggs","~12g protein, ~10g fat"],
        ["Liquid egg whites",      ewG+"",            "g",   "~12g protein per 100g"],
        ["Old-fashioned oats, dry",oatsG+"",          "g",   "~65g carbs per 100g"],
        ["Mixed berries",          "1 cup (~150g)",   "",    "~12g carbs — no need to weigh"],
        ["Cooking spray",          "as needed",       "",    "for the omelet"],
        ["Salt, pepper, spices",   "to taste",        "",    ""]
      ]
    },
    { title:"SNACK 1", recipe:"Greek Yogurt Parfait",
      cal:Math.round(cal*0.10), p:s1P, c:s1C, f:s1F,
      rows:[
        ["Nonfat plain Greek yogurt","170",           "g",  "~17g protein"],
        ["High-protein granola",     carbG(s1C*0.6,0.60,50)+"","g","~60g carbs per 100g"],
        ["Honey or sugar-free syrup","1 tsp",         "",   "optional"]
      ]
    },
    { title:"LUNCH", recipe:"Chicken Rice Bowl + Veggies + Avocado",
      cal:Math.round(cal*0.30), p:lP, c:lC, f:lF,
      rows:[
        ["Chicken breast, cooked",     d1lCkG+"",   "g","31g protein per 100g"],
        ["White rice, cooked",         d1lRiG+"",   "g","28g carbs per 100g"],
        ["Broccoli or steamed veggies","1 cup (~150g)","","free food — fiber"],
        ["Avocado",                    d1lAvG+"",   "g","15g fat per 100g"],
        ["Olive oil, measured",        d1lOiG+"",   "g","measure carefully"],
        ["Lemon, salsa, spices",       "to taste",  "", ""]
      ]
    },
    { title:"SNACK 2", recipe:"Protein Shake + Banana",
      cal:Math.round(cal*0.10), p:s2P, c:s2C, f:s2F,
      rows:[
        ["Protein powder",        "1 scoop (~30g)",   "","~25g protein"],
        ["Fairlife low-fat milk", "1 cup (240ml)",    "","~13g protein"],
        ["Banana",                "1 medium (~120g)", "","~27g carbs — no need to weigh"]
      ]
    },
    { title:"DINNER", recipe:"Salmon + Sweet Potato + Salad",
      cal:Math.round(cal*0.25), p:dP, c:dC, f:dF,
      rows:[
        ["Salmon fillet, raw",   d1dSaG+"", "g","~20g protein per 100g raw"],
        ["Sweet potato, cooked", d1dSpG+"", "g","~20g carbs per 100g"],
        ["Mixed salad greens",   "2 cups (~80g)","","free food — fiber"],
        ["Olive oil, measured",  d1dOiG+"", "g","measure carefully"],
        ["Garlic, lemon, herbs", "to taste","", ""]
      ]
    }
  ];

  var day2 = [
    { title:"BREAKFAST", recipe:"Protein Pancakes + Scrambled Eggs",
      cal:Math.round(cal*0.25), p:bP, c:bC, f:bF,
      rows:[
        ["Kodiak pancake mix, dry",d2bKoG+"",         "g",    "~62g carbs, ~12g protein per 100g"],
        ["Liquid egg whites",      d2bEwG+"",          "g",    "~12g protein per 100g"],
        ["Whole eggs",             "2",                "eggs", "~12g protein, ~10g fat — scrambled on side"],
        ["Fresh strawberries",     "1 cup (~150g)",    "",     "~11g carbs — no need to weigh"],
        ["Sugar-free syrup",       "to taste",         "",     ""],
        ["Cooking spray",          "as needed",        "",     ""]
      ]
    },
    { title:"SNACK 1", recipe:"Cottage Cheese + Fruit",
      cal:Math.round(cal*0.10), p:s1P, c:s1C, f:s1F,
      rows:[
        ["Low-fat cottage cheese", d2s1CoG+"","g","~11g protein per 100g"],
        ["Pineapple chunks",       "1/2 cup (~80g)","","~11g carbs — no need to weigh"],
        ["Cinnamon",               "to taste",      "","optional"]
      ]
    },
    { title:"LUNCH", recipe:"Ground Turkey Taco Bowl",
      cal:Math.round(cal*0.30), p:lP, c:lC, f:lF,
      rows:[
        ["93% lean ground turkey, cooked",d2lTkG+"","g","~27g protein per 100g"],
        ["White rice, cooked",            d2lRiG+"","g","~28g carbs per 100g"],
        ["Black beans, drained",          d2lBeG+"","g","~21g carbs per 100g"],
        ["Salsa",                         "2 tbsp", "","low calorie"],
        ["Avocado",                       d2lAvG+"","g","~15g fat per 100g"],
        ["Taco seasoning",                "to taste","",""]
      ]
    },
    { title:"SNACK 2", recipe:"Fairlife Shake + Rice Cakes",
      cal:Math.round(cal*0.10), p:s2P, c:s2C, f:s2F,
      rows:[
        ["Fairlife protein shake",     "1 bottle (340ml)","","~30g protein"],
        ["Plain rice cakes",           s2RcN+" ",         "cakes","~7g carbs each"],
        ["PB2 powdered peanut butter", "1 tbsp (~12g)",   "","mix with water to spread"]
      ]
    },
    { title:"DINNER", recipe:"Ground Turkey + Baby Potatoes + Zucchini",
      cal:Math.round(cal*0.25), p:dP, c:dC, f:dF,
      rows:[
        ["93% lean ground turkey, raw",d2dTkG+"","g","~27g protein per 100g raw"],
        ["Baby potatoes, boiled",      d2dPoG+"","g","~17g carbs per 100g"],
        ["Zucchini, sauteed",          "1 medium (~150g)","","free food — fiber"],
        ["Olive oil, measured",        d2dOiG+"","g","measure carefully"],
        ["Garlic, Italian seasoning",  "to taste",       "",""]
      ]
    }
  ];

  var day3 = [
    { title:"BREAKFAST", recipe:"Chocolate Overnight Oats + Hard Boiled Eggs",
      cal:Math.round(cal*0.25), p:bP, c:bC, f:bF,
      rows:[
        ["Old-fashioned oats, dry",  d3bOaG+"",        "g",    "~65g carbs per 100g"],
        ["Chocolate protein powder", "1 scoop (~30g)", "",     "~25g protein"],
        ["Fairlife low-fat milk",    "1 cup (240ml)",  "",     "mix into oats overnight — ~13g protein"],
        ["Hard boiled eggs",         "2",              "eggs", "~12g protein, ~10g fat"],
        ["Blueberries",              "1/2 cup (~75g)", "",     "~11g carbs — no need to weigh"],
        ["Chia seeds",               "1 tsp (~5g)",    "",     "fiber and omega-3"]
      ]
    },
    { title:"SNACK 1", recipe:"Tuna + Rice Cakes",
      cal:Math.round(cal*0.10), p:s1P, c:s1C, f:s1F,
      rows:[
        ["Canned tuna in water, drained",d3s1TuG+"","g","~25g protein per 100g"],
        ["Plain rice cakes",             d3s1RcN+" ","cakes","~7g carbs each"],
        ["Nonfat Greek yogurt",          "2 tbsp (~30g)","","mix with tuna as dressing"],
        ["Hot sauce or mustard",         "to taste",     "",""]
      ]
    },
    { title:"LUNCH", recipe:"Shrimp + Quinoa + Roasted Peppers",
      cal:Math.round(cal*0.30), p:lP, c:lC, f:lF,
      rows:[
        ["Shrimp, cooked",         d3lShG+"","g","~24g protein per 100g"],
        ["Quinoa, cooked",         d3lQuG+"","g","~21g carbs per 100g"],
        ["Bell peppers, roasted",  "1 large (~150g)","","free food — vitamin C"],
        ["Olive oil, measured",    d3lOiG+"","g","measure carefully"],
        ["Lemon, garlic, paprika", "to taste",     "",""]
      ]
    },
    { title:"SNACK 2", recipe:"Greek Yogurt + Protein Bar",
      cal:Math.round(cal*0.10), p:s2P, c:s2C, f:s2F,
      rows:[
        ["Nonfat plain Greek yogurt","120",   "g",  "~12g protein"],
        ["Quest or RX protein bar",  "1 bar", "",   "~21g protein — check label"],
        ["Berries",                  "handful","",  "optional topping"]
      ]
    },
    { title:"DINNER", recipe:"Chicken Thighs + Brown Rice + Broccoli",
      cal:Math.round(cal*0.25), p:dP, c:dC, f:dF,
      rows:[
        ["Chicken thighs, skinless raw",d3dThG+"","g","~19g protein per 100g raw"],
        ["Brown rice, cooked",          d3dBrG+"","g","~23g carbs per 100g"],
        ["Broccoli, roasted",           "1.5 cups (~150g)","","free food — fiber"],
        ["Olive oil, measured",         d3dOiG+"","g","measure carefully"],
        ["Soy sauce, garlic, ginger",   "to taste",       "",""]
      ]
    }
  ];

  // ── RENDER ──────────────────────────────────────────────
  window.switchDay = function(n) {
    document.querySelectorAll('.day-tab').forEach(function(el,i){ el.classList.toggle('active', i===n-1); });
    document.querySelectorAll('.day-panel').forEach(function(el,i){ el.classList.toggle('active', i===n-1); });
  };

  function mealHTML(m) {
    var h = '<div class="meal"><div class="meal-head"><div>';
    h += '<div class="meal-title">'+m.title+'</div><div class="meal-recipe">'+m.recipe+'</div>';
    h += '</div><div class="meal-macros"><strong>~'+m.cal+' kcal</strong>P: ~'+m.p+'g &nbsp; C: ~'+m.c+'g &nbsp; F: ~'+m.f+'g</div></div>';
    h += '<table><thead><tr><th>Ingredient</th><th>Amount</th><th>Unit</th><th>Note</th></tr></thead><tbody>';
    m.rows.forEach(function(row){
      h += '<tr><td class="td-food">'+row[0]+'</td><td class="td-amt">'+row[1]+'</td><td class="td-unit">'+row[2]+'</td><td class="td-note">'+row[3]+'</td></tr>';
    });
    return h + '</tbody></table></div>';
  }

  function panelHTML(meals, n, active) {
    var h = '<div class="day-panel'+(active?' active':'')+'" id="panel'+n+'">';
    meals.forEach(function(m){ h += mealHTML(m); });
    h += '<div class="callout"><p><strong>From Lexi</strong>These portions are your starting point. Weigh your food with a kitchen scale for best accuracy and remember, protein first at every single meal. You have got this.</p></div>';
    h += '<button class="btn-outline" onclick="window.print()">Print or Save as PDF</button>';
    h += '<div style="text-align:center;margin-top:14px;font-size:10px;color:#8fa4b6;">THE | MACRO | EDIT &nbsp; allfitnessbylexi@gmail.com &nbsp; @the_macro_edit</div>';
    h += '</div>';
    return h;
  }

  var macroBar = '<div class="card"><div class="ctitle">Your Daily Targets</div><div class="macro-grid">'
    + ['#5c2a57','#a895bf','#8fa4b6','#d8a7b1'].map(function(col,i){
        var labels=['Calories','Protein','Carbs','Fat'], vals=[cal,pro,carb,fat], units=['kcal','g','g','g'];
        return '<div class="macro-box"><div class="macro-val" style="color:'+col+'">'+vals[i]+'</div><div class="macro-lbl">'+labels[i]+'</div><div class="macro-unit">'+units[i]+'</div></div>';
      }).join('')
    + '</div><div class="water">Daily water goal: <strong>'+water+' oz</strong> minimum ('+Math.round(water*29.5)+' ml)</div></div>';

  var tabs = '<div class="day-tabs">'
    + ['Day 1','Day 2','Day 3'].map(function(l,i){
        return '<button class="day-tab'+(i===0?' active':'')+'" id="tab'+(i+1)+'" onclick="switchDay('+(i+1)+')">'+l+'</button>';
      }).join('')
    + '</div>';

  var out = document.getElementById('menu-out');
  out.classList.add('hidden');
  out.innerHTML = macroBar + tabs
    + panelHTML(day1,1,true) + panelHTML(day2,2,false) + panelHTML(day3,3,false);
  setTimeout(function(){ out.classList.remove('hidden'); }, 0);
}

window.onload = function(){ build(); };
</script>
</body>
</html>
